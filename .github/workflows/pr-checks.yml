name: PR Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    - name: Markdown Lint
      run: npx markdownlint-cli "src/content/docs/**/*.md" "src/content/docs/**/*.mdx"

    - name: Audit Poetry
      run: npm run audit:poetry
